name: Build APK

on:
  push:
    branches: [ "main", "master", "android" ]
  pull_request:
    branches: [ "main", "master", "android" ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: 📦 Install required SDK components
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: 🏗️ Build Debug APK
        run: gradle assembleDebug
        working-directory: schulte-grid-android

      - name: 📤 Upload APK to Release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest-android"
          artifacts: "schulte-grid-android/app/build/outputs/apk/debug/*.apk"
          allowUpdates: true
          replacesArtifacts: true
          artifactContentType: "application/vnd.android.package-archive"
          omitBody: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Upload APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: schulte-grid-apk
          path: schulte-grid-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
